<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Conselho de Classe - Sobral Pinto</title>
    <style>
        :root { --blue: #0d47a1; --gold: #ffd600; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        
        .container-conselho { width: 98%; margin: 0 auto; }

        .dashboard-header { 
            background: var(--blue); color: white; padding: 15px; border-radius: 8px; 
            border-bottom: 5px solid var(--gold); margin-bottom: 20px; text-align: center; 
        }

        .filtros { 
            background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; margin-bottom: 20px;
        }

        .card { 
            background: white; padding: 25px; border-radius: 8px; margin-bottom: 20px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box;
        }

        .pedagogico { border-left: 10px solid #4caf50; }
        .disciplinar { border-left: 10px solid #f44336; }
        
        .analise-ia { 
            background: #e3f2fd; padding: 20px; border-radius: 8px; font-size: 16px;
            line-height: 1.6; color: #0d47a1; border: 1px solid #bbdefb; 
        }

        select, button { padding: 12px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        button { background: var(--blue); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-print { background: #444; margin-left: auto; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f9fa; color: var(--blue); }
        .alerta { color: red; font-weight: bold; }
        
        h3 { margin-top: 0; color: var(--blue); text-transform: uppercase; font-size: 16px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        /* CONFIGURAÇÃO DE IMPRESSÃO (A4) */
        @media print {
            body { background: white; padding: 0; }
            .filtros, .btn-print, .dashboard-header { display: none !important; }
            .container-conselho { width: 100%; }
            .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; margin-bottom: 10px; }
            .analise-ia { background: white !important; color: black; border: 1px solid #000; }
            th { background: #eee !important; color: black !important; }
            .pedagogico, .disciplinar { border-left: 5px solid #000 !important; }
            h1::before { content: "RELATÓRIO DE CONSELHO - "; }
        }
    </style>
</head>
<body>

<div class="container-conselho">
    <div class="dashboard-header">
        <h1>🎓 Portal do Conselho de Classe</h1>
        <p>E. M. Sobral Pinto | Diagnóstico Geral por Turma</p>
    </div>

    <div class="filtros">
        <div>
            <label>Turma:</label><br>
            <select id="selTurma"></select>
        </div>
        <div>
            <label>Período:</label><br>
            <select id="selTrimestre">
                <option value="Todos">Todos os Trimestres</option>
                <option value="1º Trimestre">1º Trimestre</option>
                <option value="2º Trimestre">2º Trimestre</option>
                <option value="3º Trimestre">3º Trimestre</option>
            </select>
        </div>
        <button onclick="carregarConselho()">📊 Gerar Diagnóstico</button>
        <button class="btn-print" id="btnPrint" style="display:none;" onclick="window.print()">🖨️ Imprimir para Ata</button>
    </div>

    <div id="conteudoRelatorio" style="display:none;">
        <div class="card">
            <h3>🤖 Parâmetro Geral Disciplinar</h3>
            <div id="iaAnalise" class="analise-ia"></div>
        </div>

        <div class="card pedagogico">
            <h3>📚 Ocorrências Pedagógicas</h3>
            <div id="tabelaPedagogica"></div>
        </div>

        <div class="card disciplinar">
            <h3>⚠️ Alunos com maior recorrência</h3>
            <div id="tabelaDisciplinar"></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwlVbz3C-bdKUbRvuWx4SrL9eiFdmyRwwZwUYVhi9u8u2df9NSgNRNjsYx7gD5q1qef7g/exec";

    window.onload = async () => {
        try {
            const res = await fetch(`${SCRIPT_URL}?acao=getListaAlunos`);
            const turmas = await res.json();
            const sel = document.getElementById('selTurma');
            Object.keys(turmas).sort().forEach(t => sel.add(new Option(t, t)));
        } catch(e) { console.error("Erro ao carregar turmas"); }
    };

    async function carregarConselho() {
        const turma = document.getElementById('selTurma').value;
        const tri = document.getElementById('selTrimestre').value;
        if(!turma) return alert("Selecione uma turma!");
        
        document.getElementById('conteudoRelatorio').style.display = 'block';
        document.getElementById('btnPrint').style.display = 'block';

        const res = await fetch(`${SCRIPT_URL}?acao=getDados`);
        let data = await res.json();
        data.shift(); 

        let filtrados = data.filter(r => String(r[3]).trim() === turma);
        if(tri !== "Todos") filtrados = filtrados.filter(r => identificarTrimestre(r[1]) === tri);

        processarIA(filtrados, turma);
        processarTabelas(filtrados);
    }

    function processarIA(dados, turma) {
        const total = dados.length;
        if(total === 0) {
            document.getElementById('iaAnalise').innerHTML = "Nenhum registro encontrado.";
            return;
        }
        const pedag = dados.filter(r => String(r[2]).includes("Pedagógica")).length;
        const discip = total - pedag;
        
        let texto = `<b>Análise:</b> Turma <b>${turma}</b> com <b>${total}</b> registros. `;
        texto += discip > pedag ? "Clima disciplinar é a maior demanda. " : "Dificuldades de aprendizagem são o foco principal. ";
        
        const top = encontrarTopAluno(dados);
        if(top.qtd > 4) texto += `<br>⚠️ <b>Atenção:</b> Aluno <b>${top.nome}</b> concentra ${top.qtd} registros.`;

        document.getElementById('iaAnalise').innerHTML = texto;
    }

    function processarTabelas(dados) {
        const pedag = dados.filter(r => String(r[2]).includes("Pedagógica"));
        let hPed = "<table><tr><th>Aluno</th><th>Descrição</th><th>Data</th></tr>";
        pedag.forEach(r => hPed += `<tr><td><b>${r[4]}</b></td><td>${r[5]}</td><td>${r[1]}</td></tr>`);
        document.getElementById('tabelaPedagogica').innerHTML = hPed + "</table>";

        const cont = {};
        dados.forEach(r => { if(!String(r[2]).includes("Pedagógica")) cont[r[4]] = (cont[r[4]] || 0) + 1 });
        const rank = Object.entries(cont).sort((a,b) => b[1]-a[1]).slice(0,10);
        let hDisc = "<table><tr><th>Aluno</th><th>Frequência</th></tr>";
        rank.forEach(([n, q]) => hDisc += `<tr><td><b>${n}</b></td><td><span class="${q > 3 ? 'alerta' : ''}">${q} registros</span></td></tr>`);
        document.getElementById('tabelaDisciplinar').innerHTML = hDisc + "</table>";
    }

    function encontrarTopAluno(dados) {
        const c = {};
        dados.forEach(r => c[r[4]] = (c[r[4]] || 0) + 1);
        const s = Object.entries(c).sort((a,b) => b[1]-a[1]);
        return s.length > 0 ? {nome: s[0][0], qtd: s[0][1]} : {nome: "", qtd: 0};
    }

    function identificarTrimestre(ds) { 
        if(!ds) return ""; 
        let p = ds.split('/'); 
        let d = new Date(p[2], p[1]-1, p[0]);
        if (d >= new Date(2026, 1, 4) && d <= new Date(2026, 4, 6)) return "1º Trimestre";
        if (d >= new Date(2026, 4, 7) && d <= new Date(2026, 7, 31)) return "2º Trimestre";
        if (d >= new Date(2026, 8, 1) && d <= new Date(2026, 11, 18)) return "3º Trimestre";
        return "Fora de Período";
    }
</script>
</body>
</html>
